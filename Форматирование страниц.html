<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форматирование страниц | Видео и задания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0715;
            font-family: 'Inter', sans-serif;
            color: #f0eef7;
            padding: 1.5rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #e879f9;
            text-align: center;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 1rem 0 0.5rem;
            color: #e879f9;
            border-left: 3px solid #e879f9;
            padding-left: 0.8rem;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .task-iframe {
            width: 100%;
            min-height: 450px;
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(30, 20, 50, 0.3);
        }
        .note {
            font-size: 0.8rem;
            color: #9b8ccb;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- 1. Видео из ВКонтакте -->
    <div class="section-title">📺 Видеоурок</div>
    <div class="video-wrapper">

    </div>

    <!-- 2. Задание (встроенное из другого файла) -->
